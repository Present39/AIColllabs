<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIColllabs - Atmosphere Component</title>
    <link rel="stylesheet" href="atmosphere.css">
</head>
<body>
    <div class="atmosphere-container">
        <div class="atmosphere-component">
            <header class="atmosphere-header">
                <h1>AIColllabs Atmosphere</h1>
                <p class="atmosphere-subtitle">Link Learn Leverage your business with AI</p>
            </header>
            
            <main class="atmosphere-content">
                <div class="character-showcase">
                    <div class="character claudette">
                        <h3>Claudette</h3>
                        <p>Sphere host</p>
                    </div>
                    
                    <div class="character stuwey">
                        <h3>Stuwey</h3>
                        <p>Mini-sphere met vleugels en inclusieve knop</p>
                    </div>
                    
                    <div class="character clube">
                        <h3>Clube & Clubie</h3>
                        <p>Cube varianten</p>
                    </div>
                </div>
                
                <div class="atmosphere-description">
                    <p>Welkom in de AIColllabs atmosphere - een lichte, flow-achtige omgeving die creativiteit en samenwerking bevordert.</p>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
